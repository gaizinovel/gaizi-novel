<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面不存在 | 盖子小说</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .error-page {
            padding: 40px;
        }
        .error-code {
            font-size: 120px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }
        .error-page h1 {
            font-size: 24px;
            margin: 20px 0;
        }
        .error-page p {
            color: var(--secondary);
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <h1>页面不存在</h1>
        <p>抱歉，你访问的页面去旅行了~</p>
        <a href="/" class="btn btn-primary">返回首页</a>
    </div>
</body>
</html>
