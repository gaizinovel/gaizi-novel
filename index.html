<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盖子小说 - 发现好文章</title>
    <meta name="description" content="盖子小说，文字创作者分享平台，发现优质文章、小说、文案、博客">
    <meta name="keywords" content="盖子小说,小说,文章,文案,博客,文字创作,免费小说阅读">
    <meta name="author" content="盖子小说">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://gaizinovel.github.io/gaizi-novel/">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">
                <span class="logo-icon">📖</span>
                <span class="logo-text">盖子小说</span>
            </a>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索标题、简介..." autocomplete="off">
                <button class="search-btn" onclick="search()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="M21 21l-4.35-4.35"></path>
                    </svg>
                </button>
            </div>
            
            <div class="user-area" id="userArea">
                <button class="btn btn-primary" onclick="openLoginModal()">登录</button>
            </div>
        </div>
    </header>

    <!-- 置顶横幅 -->
    <section class="pinned-banner" id="pinnedBanner" style="display: none;">
        <div class="pinned-container">
            <span class="pinned-label">置顶</span>
            <div class="pinned-track" id="pinnedTrack"></div>
            <button class="pinned-arrow pinned-prev" onclick="prevPinned()">◀</button>
            <button class="pinned-arrow pinned-next" onclick="nextPinned()">▶</button>
        </div>
    </section>

    <!-- 筛选标签 -->
    <section class="filter-bar">
        <div class="filter-content">
            <button class="filter-tag active" data-type="all" onclick="filterByType('all')">全部</button>
            <button class="filter-tag" data-type="ranking" onclick="filterByType('ranking')">🔥 热榜</button>
            <button class="filter-tag" data-type="novel" onclick="filterByType('novel')">小说</button>
            <button class="filter-tag" data-type="copywriting" onclick="filterByType('copywriting')">文案</button>
            <button class="filter-tag" data-type="blog" onclick="filterByType('blog')">博客</button>
        </div>
    </section>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="content-container">
            <div class="content-list" id="contentList">
                <!-- 动态加载内容卡片 -->
            </div>
            
            <!-- 空状态 -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-icon">📝</div>
                <h3>暂无内容</h3>
                <p>还没有人分享作品，成为第一个分享者吧！</p>
                <button class="btn btn-primary" onclick="openPublishModal()" id="emptyPublishBtn">立即分享</button>
            </div>
            
            <!-- 加载中 -->
            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>
            
            <!-- 加载更多 -->
            <div class="load-more" id="loadMoreBtn" style="display: none;">
                <button class="btn btn-secondary" onclick="loadMore()">加载更多</button>
            </div>
        </div>
    </main>

    <!-- 底部 -->
    <footer class="footer">
        <div class="footer-content">
            <p>© 2026 盖子小说 · 用心发现好文</p>
        </div>
    </footer>

    <!-- 登录模态框 -->
    <div class="modal" id="loginModal">
        <div class="modal-overlay" onclick="closeLoginModal()"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeLoginModal()">×</button>
            
            <div class="login-header">
                <h2>登录 / 注册</h2>
                <p>手机号验证即可参与</p>
            </div>
            
            <div class="login-form" id="phoneStep">
                <div class="form-group">
                    <label>手机号</label>
                    <div class="phone-input">
                        <span class="phone-prefix">+86</span>
                        <input type="tel" id="phoneInput" placeholder="请输入手机号" maxlength="11">
                    </div>
                </div>
                <button class="btn btn-primary btn-block" onclick="sendCode()">获取验证码</button>
            </div>
            
            <div class="login-form" id="codeStep" style="display: none;">
                <div class="form-group">
                    <label>验证码</label>
                    <div class="code-input-group">
                        <input type="text" id="codeInput" placeholder="请输入6位验证码" maxlength="6">
                        <button class="btn btn-secondary" id="resendBtn" onclick="sendCode()">重新获取</button>
                    </div>
                </div>
                <button class="btn btn-primary btn-block" onclick="verifyCode()">验证登录</button>
                <p class="code-hint">验证码已发送至您的手机</p>
            </div>
            
            <div class="login-tip">
                <span>未注册用户验证后自动注册</span>
            </div>
        </div>
    </div>

    <!-- 发布模态框 -->
    <div class="modal" id="publishModal">
        <div class="modal-overlay" onclick="closePublishModal()"></div>
        <div class="modal-content modal-large">
            <button class="modal-close" onclick="closePublishModal()">×</button>
            
            <div class="publish-header">
                <h2>分享作品</h2>
            </div>
            
            <form class="publish-form" id="publishForm" onsubmit="submitContent(event)">
                <div class="form-group">
                    <label>标题 <span class="required">*</span></label>
                    <input type="text" id="titleInput" placeholder="给你的作品起个名字（2-50字）" required maxlength="50">
                </div>
                
                <div class="form-group">
                    <label>类型 <span class="required">*</span></label>
                    <select id="typeSelect" required>
                        <option value="">选择类型</option>
                        <option value="article">📝 文章</option>
                        <option value="novel">📚 小说</option>
                        <option value="copywriting">✍️ 文案</option>
                        <option value="blog">🌐 博客</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>链接 <span class="required">*</span></label>
                    <input type="url" id="urlInput" placeholder="粘贴你的作品链接" required>
                    <p class="form-hint">支持：微信公众号、知乎、简书、起点、晋江等文字平台</p>
                </div>
                
                <div class="form-group">
                    <label>简介 <span class="required">*</span></label>
                    <textarea id="introInput" placeholder="介绍一下你的作品（20-500字），让读者感兴趣" required minlength="20" maxlength="500"></textarea>
                    <p class="char-count"><span id="charCount">0</span>/500</p>
                </div>
                
                <div class="form-group">
                    <label>标签</label>
                    <input type="text" id="tagsInput" placeholder="添加标签，用逗号分隔（可选，最多5个）">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">发布作品</button>
            </form>
        </div>
    </div>

    <!-- 详情模态框 -->
    <div class="modal" id="detailModal">
        <div class="modal-overlay" onclick="closeDetailModal()"></div>
        <div class="modal-content modal-large">
            <button class="modal-close" onclick="closeDetailModal()">×</button>
            
            <div class="detail-content" id="detailContent">
                <!-- 动态加载 -->
            </div>
        </div>
    </div>

    <!-- Toast提示 -->
    <div class="toast" id="toast">
        <span id="toastText"></span>
    </div>

    <!-- 核心脚本 -->
    <script src="js/app.js"></script>
</body>
</html>
