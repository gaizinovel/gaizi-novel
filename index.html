<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盖子小说 - 发现好文章</title>
    <meta name="description" content="盖子小说，文字创作者分享平台，发现优质文章、小说、文案、博客">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 跑马灯欢迎词 -->
    <div class="marquee-bar">
        <div class="marquee-content">
            <span>🎉 欢迎来到盖子小说！分享你的文字，发现更多好文 📖</span>
            <span>🔥 热榜实时更新最新文学资讯</span>
            <span>✏️ 点击右上角分享发布你的作品</span>
            <span>📚 发现优质小说、文案、博客</span>
        </div>
    </div>

    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">
                <span class="logo-icon">📖</span>
                <span class="logo-text">盖子小说</span>
            </a>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索标题、简介..." autocomplete="off">
                <button class="search-btn" onclick="doSearch()">🔍</button>
            </div>
            <div class="user-area" id="userArea">
                <button class="btn btn-primary" onclick="openPublishModal()">✏️ 分享发布</button>
            </div>
        </div>
    </header>

    <section class="filter-bar">
        <div class="filter-content">
            <button class="filter-tag active" data-filter="all" onclick="filterByType('all')">全部</button>
            <button class="filter-tag" data-filter="ranking" onclick="filterByType('ranking')">🔥 热榜</button>
            <button class="filter-tag" data-filter="novel" onclick="filterByType('novel')">📚 小说</button>
            <button class="filter-tag" data-filter="copywriting" onclick="filterByType('copywriting')">✍️ 文案</button>
            <button class="filter-tag" data-filter="blog" onclick="filterByType('blog')">🌐 博客</button>
        </div>
    </section>

    <main class="main-content">
        <div class="content-container">
            <div class="content-list" id="contentList"></div>
            <div class="loading-state" id="loadingState" style="display:none;">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2026 盖子小说 · 用心发现好文</p>
        </div>
    </footer>

    <!-- 发布弹窗 -->
    <div class="modal" id="publishModal">
        <div class="modal-overlay" onclick="closePublishModal()"></div>
        <div class="modal-content modal-large">
            <button class="modal-close" onclick="closePublishModal()">&times;</button>
            <div class="publish-header">
                <h2>✏️ 分享发布</h2>
                <p>分享你的好文、小说、文案或博客链接</p>
            </div>
            <form id="publishForm" onsubmit="submitContent(event)" class="publish-form">
                <div class="form-group">
                    <label>标题 <span class="required">*</span></label>
                    <input type="text" id="titleInput" placeholder="请输入标题" required maxlength="100">
                </div>
                <div class="form-group">
                    <label>类型 <span class="required">*</span></label>
                    <select id="typeSelect" required>
                        <option value="">请选择类型</option>
                        <option value="article">📝 文章</option>
                        <option value="novel">📚 小说</option>
                        <option value="copywriting">✍️ 文案</option>
                        <option value="blog">🌐 博客</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>链接 <span class="required">*</span></label>
                    <input type="url" id="urlInput" placeholder="https://..." required>
                </div>
                <div class="form-group">
                    <label>简介 <span class="required">*</span>（至少20字）</label>
                    <textarea id="introInput" placeholder="简要描述内容..." required minlength="20"></textarea>
                    <div class="char-count"><span id="charCount">0</span>/500</div>
                </div>
                <div class="form-group">
                    <label>标签（可选，逗号分隔，最多5个）</label>
                    <input type="text" id="tagsInput" placeholder="如：科幻,连载,推荐">
                </div>
                <!-- 置顶选项 -->
                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="pinnedInput">
                        <span class="checkmark"></span>
                        <span class="checkbox-text">📌 置顶此内容（优先展示）</span>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary btn-block">发布分享</button>
            </form>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-overlay" onclick="closeDetailModal()"></div>
        <div class="modal-content modal-large">
            <button class="modal-close" onclick="closeDetailModal()">&times;</button>
            <div id="detailContent" class="detail-content"></div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"><span id="toastText"></span></div>

    <script src="js/app.js"></script>
</body>
</html>
