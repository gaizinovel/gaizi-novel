<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盖子小说 - 发现好文章</title>
    <meta name="description" content="盖子小说，文字创作者分享平台，发现优质文章、小说、文案、博客">
    <meta name="keywords" content="盖子小说,小说,文章,文案,博客,文字创作,免费小说阅读">
    <meta name="author" content="盖子小说">
    <meta name="robots" content="index, follow">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">
                <span class="logo-icon">📖</span>
                <span class="logo-text">盖子小说</span>
            </a>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索标题、简介..." autocomplete="off">
                <button class="search-btn" onclick="search()">🔍</button>
            </div>
            <div class="user-area" id="userArea">
                <button class="btn btn-primary" onclick="openLoginModal()">登录</button>
            </div>
        </div>
    </header>

    <section class="filter-bar">
        <div class="filter-content">
            <button class="filter-tag active" onclick="filterByType('all')">全部</button>
            <button class="filter-tag" onclick="filterByType('ranking')">🔥 热榜</button>
            <button class="filter-tag" onclick="filterByType('novel')">小说</button>
            <button class="filter-tag" onclick="filterByType('copywriting')">文案</button>
            <button class="filter-tag" onclick="filterByType('blog')">博客</button>
        </div>
    </section>

    <main class="main-content">
        <div class="content-container">
            <div class="content-list" id="contentList"></div>
            <div class="loading-state" id="loadingState">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>© 2026 盖子小说 · 用心发现好文</p>
        </div>
    </footer>

    <div class="modal" id="loginModal">
        <div class="modal-overlay" onclick="closeLoginModal()"></div>
        <div class="modal-content">
            <button class="modal-close" onclick="closeLoginModal()">×</button>
            <div class="login-header">
                <h2>登录 / 注册</h2>
                <p>手机号验证即可参与</p>
            </div>
            <div class="login-form">
                <div class="form-group">
                    <label>手机号</label>
                    <input type="tel" id="phoneInput" placeholder="请输入手机号" maxlength="11">
                </div>
                <button class="btn btn-primary btn-block" onclick="sendCode()">获取验证码</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <span id="toastText"></span>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
